<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار تفاعلي – تمويل المشاريع</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --navy: #1F3864;
    --blue: #2E75B6;
    --lightblue: #D6E4F0;
    --green: #1a7a4a;
    --greenlight: #d4f0e2;
    --red: #c0392b;
    --redlight: #fde8e6;
    --gold: #c9a84c;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1a1a2e;
    --gray: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -30px;
    width: 250px; height: 250px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .header h1 { font-size: 1.7rem; font-weight: 900; margin-bottom: 6px; position: relative; z-index:1; }
  .header p { font-size: 0.95rem; opacity: 0.85; position: relative; z-index:1; }

  /* TABS */
  .tabs {
    display: flex;
    overflow-x: auto;
    background: var(--navy);
    padding: 0 12px;
    gap: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: white; }
  .tab-btn.active {
    color: white;
    border-bottom-color: var(--gold);
  }

  /* PROGRESS */
  .progress-bar {
    background: #dde3ea;
    height: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width 0.4s ease;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: space-around;
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    font-size: 0.82rem;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-label { color: var(--gray); font-size: 0.75rem; }

  /* MAIN */
  .main { padding: 16px; max-width: 720px; margin: 0 auto; }

  /* QUESTION CARD */
  .question-card {
    background: white;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(31,56,100,0.08);
    border-right: 4px solid var(--blue);
    transition: box-shadow 0.2s;
  }
  .question-card:hover { box-shadow: 0 4px 20px rgba(31,56,100,0.13); }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .q-number {
    background: var(--navy);
    color: white;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .q-section {
    font-size: 0.75rem;
    color: var(--blue);
    font-weight: 600;
    background: var(--lightblue);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    text-align: right;
    font-family: 'Cairo', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    transition: all 0.2s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--lightblue);
  }
  .option-btn .opt-letter {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--lightblue);
    color: var(--navy);
    font-weight: 700;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) .opt-letter {
    background: var(--blue);
    color: white;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: var(--greenlight);
  }
  .option-btn.correct .opt-letter {
    background: var(--green);
    color: white;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: var(--redlight);
  }
  .option-btn.wrong .opt-letter {
    background: var(--red);
    color: white;
  }
  .option-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    display: none;
  }
  .feedback.correct { background: var(--greenlight); color: var(--green); border-right: 3px solid var(--green); }
  .feedback.wrong { background: var(--redlight); color: var(--red); border-right: 3px solid var(--red); }

  /* NAV BUTTONS */
  .nav-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 16px 0 24px;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 11px 24px;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-prev { background: #e5e7eb; color: var(--navy); }
  .btn-prev:hover { background: #d1d5db; }
  .btn-next { background: var(--navy); color: white; }
  .btn-next:hover { background: var(--blue); }
  .btn-result { background: var(--gold); color: white; }
  .btn-result:hover { background: #b8922a; }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    padding: 32px 16px;
  }
  .result-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    border: 8px solid var(--blue);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 20px;
    background: white;
  }
  .result-score { font-size: 2.2rem; font-weight: 900; color: var(--navy); }
  .result-total { font-size: 0.85rem; color: var(--gray); }
  .result-title { font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .result-sub { color: var(--gray); font-size: 0.9rem; margin-bottom: 24px; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .result-box {
    background: white;
    border-radius: 12px;
    padding: 14px 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .result-box .val { font-size: 1.5rem; font-weight: 800; }
  .result-box .lbl { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }
  .correct-val { color: var(--green); }
  .wrong-val { color: var(--red); }
  .pct-val { color: var(--blue); }

  .btn-restart {
    background: var(--navy);
    color: white;
    border: none;
    padding: 13px 32px;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: var(--blue); }

  /* SECTION LABEL */
  .section-header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: center;
  }

  /* EMPTY STATE */
  .no-q { text-align: center; padding: 40px; color: var(--gray); font-size: 1rem; }

  @media(max-width:480px) {
    .header h1 { font-size: 1.3rem; }
    .result-grid { grid-template-columns: repeat(3,1fr); }
    .nav-btn { padding: 10px 16px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎓 اختبار تفاعلي</h1>
  <p>مقرر تمويل المشاريع — 90 سؤال اختيار من متعدد</p>
</div>

<div class="tabs" id="tabs"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="statCurrent">0</div><div class="stat-label">السؤال الحالي</div></div>
  <div class="stat"><div class="stat-val green" id="statCorrect">0</div><div class="stat-label">صحيح</div></div>
  <div class="stat"><div class="stat-val red" id="statWrong">0</div><div class="stat-label">خطأ</div></div>
  <div class="stat"><div class="stat-val" id="statRemain">0</div><div class="stat-label">متبقي</div></div>
</div>

<div class="main" id="main"></div>

<div class="result-screen" id="resultScreen">
  <div class="result-circle">
    <div class="result-score" id="rScore">0</div>
    <div class="result-total" id="rTotal"></div>
  </div>
  <div class="result-title" id="rTitle"></div>
  <div class="result-sub" id="rSub"></div>
  <div class="result-grid">
    <div class="result-box"><div class="val correct-val" id="rCorrect">0</div><div class="lbl">إجابات صحيحة</div></div>
    <div class="result-box"><div class="val wrong-val" id="rWrong">0</div><div class="lbl">إجابات خاطئة</div></div>
    <div class="result-box"><div class="val pct-val" id="rPct">0%</div><div class="lbl">النسبة المئوية</div></div>
  </div>
  <button class="btn-restart" onclick="restart()">🔄 إعادة الاختبار</button>
</div>

<script>

      { q: "الفرق الأساسي بين التمويل الداخلي والخارجي هو:", opts: ["الأول من داخل الشركة", "الثاني يعتمد على الأرباح", "الأول يعتمد على السوق", "لا يوجد فرق"], ans: 0 },

let activeQuestions = allQuestions;
let activeSection = -1; // -1 = all

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  // All tab
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn' + (activeSection === -1 ? ' active' : '');
  allBtn.textContent = 'الكل (90)';
  allBtn.onclick = () => switchSection(-1);
  tabs.appendChild(allBtn);

  SECTIONS.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (activeSection === i ? ' active' : '');
    btn.textContent = sec.short + ' (12)';
    if (i === 7) btn.textContent = sec.short + ' (6)';
    btn.onclick = () => switchSection(i);
    tabs.appendChild(btn);
  });
}

function switchSection(idx) {
  activeSection = idx;
  if (idx === -1) {
    activeQuestions = allQuestions;
  } else {
    activeQuestions = allQuestions.filter(q => q.sectionIdx === idx);
  }
  currentQ = 0;
  answered = {};
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('main').style.display = '';
  buildTabs();
  render();
}

      else if (answered[key] === i && i !== q.ans) cls = ' wrong';
    }
    html += `<button class="option-btn${cls}" ${isAnswered ? 'disabled' : ''} onclick="answer(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  });

  html += `</div>`;

  if (isAnswered) {
    const correct = answered[key] === q.ans;
    html += `<div class="feedback ${correct ? 'correct' : 'wrong'}" style="display:block">
      ${correct ? '✅ إجابة صحيحة!' : `❌ الإجابة الصحيحة: ${letters[q.ans]}. ${q.opts[q.ans]}`}
    </div>`;
  }

  html += `</div>`;

  // Nav buttons
  html += `<div class="nav-btns">`;
  if (currentQ > 0) html += `<button class="nav-btn btn-prev" onclick="prev()">→ السابق</button>`;
  if (currentQ < activeQuestions.length - 1) {
    html += `<button class="nav-btn btn-next" onclick="next()">التالي ←</button>`;
  } else {
    html += `<button class="nav-btn btn-result" onclick="showResult()">🏆 عرض النتيجة</button>`;
  }
  html += `</div>`;

  main.innerHTML = html;

  // Progress
  const pct = ((currentQ + 1) / activeQuestions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function answer(idx) {
  const q = activeQuestions[currentQ];
  const key = `${q.sectionIdx}-${q.localIdx}`;
  if (answered[key] !== undefined) return;
  answered[key] = idx;
  if (idx === q.ans) correctCount++;
  else wrongCount++;
  render();
}

function next() {
  if (currentQ < activeQuestions.length - 1) { currentQ++; render(); }
}
function prev() {
  if (currentQ > 0) { currentQ--; render(); }
}

function updateStats() {
  const answered_count = Object.keys(answered).length;
  document.getElementById('statCurrent').textContent = currentQ + 1;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statRemain').textContent = activeQuestions.length - answered_count;
}

function showResult() {
  const total = activeQuestions.length;
  const pct = Math.round((correctCount / total) * 100);
  let title = '', sub = '';
  if (pct >= 90) { title = '🏆 ممتاز!'; sub = 'أداء رائع، أنت تتقن المادة بشكل ممتاز.'; }
  else if (pct >= 75) { title = '✨ جيد جداً!'; sub = 'مستوى جيد جداً، استمر في المراجعة.'; }
  else if (pct >= 60) { title = '👍 جيد'; sub = 'مستوى جيد، راجع الأسئلة التي أخطأت فيها.'; }
  else { title = '📚 تحتاج مراجعة'; sub = 'راجع المادة وأعد الاختبار مرة أخرى.'; }

  document.getElementById('rScore').textContent = correctCount;
  document.getElementById('rTotal').textContent = `من ${total}`;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rSub').textContent = sub;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rWrong').textContent = wrongCount;
  document.getElementById('rPct').textContent = pct + '%';

  document.getElementById('main').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
}

function restart() {
  currentQ = 0;
  answered = {};
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('main').style.display = '';
  render();
}

// Init
buildTabs();
render();
</script>
</body>
</html>
